[env]
RUST_TEST_THREADS = "1"
RUST_BACKTRACE = "1"

# Bindgen/clang (only if a crate uses bindgen)
BINDGEN_EXTRA_CLANG_ARGS_aarch64_unknown_linux_gnu = "--sysroot=/mnt/rpi/rootfs -I/mnt/rpi/rootfs/usr/include -I/mnt/rpi/rootfs/usr/include/aarch64-linux-gnu"

[target.aarch64-unknown-linux-gnu]
linker = "aarch64-linux-gnu-gcc"

rustflags = [
  "-C", "link-arg=--sysroot=/mnt/rpi/rootfs",
]
